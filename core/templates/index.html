<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EchoScroll Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        :root { --primary: #ff0050; --glass: rgba(255, 255, 255, 0.1); --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 420px; height: 100vh; background: #000; position: relative; overflow: hidden; border: 1px solid #333; }
        @media (min-width: 500px) { .app-container { height: 92vh; border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,0.9); } }

        /* HEADER TABS */
        .top-tabs { position: absolute; top: 0; width: 100%; z-index: 100; background: linear-gradient(rgba(0,0,0,0.8), transparent); padding: 15px 0; display: flex; justify-content: center; gap: 20px; }
        .tab-item { font-size: 14px; font-weight: 600; opacity: 0.6; cursor: pointer; transition: 0.3s; padding-bottom: 5px; }
        .tab-item.active { opacity: 1; border-bottom: 2px solid white; }

        /* REELS SCROLLER */
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { position: relative; background: #000; }
        .main-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        /* OVERLAYS (Search, Comments, Profile) */
        .overlay { position: absolute; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 20px; }
        .overlay.active { display: flex; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .overlay-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .search-input-full { flex: 1; background: #262626; border: none; border-radius: 8px; color: #fff; padding: 10px; outline: none; }

        /* COMMENT SHEET */
        #comment-sheet { position: absolute; bottom: 0; width: 100%; height: 60%; background: #262626; z-index: 3000; border-radius: 15px 15px 0 0; display: none; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #comment-sheet.active { display: flex; animation: slideUp 0.3s ease; }
        .comment-list { flex: 1; overflow-y: auto; margin-top: 10px; }
        .comment-item { margin-bottom: 12px; font-size: 13px; }
        .comment-input-row { border-top: 1px solid #444; padding-top: 10px; display: flex; gap: 10px; }

        /* SIDE ACTIONS */
        .side-bar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 20; }
        .side-item { text-align: center; font-size: 11px; cursor: pointer; }
        .side-item i { font-size: 28px; margin-bottom: 4px; }
        .fa-heart.liked { color: var(--primary); }

        /* BOTTOM NAV */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 55px; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { font-size: 22px; color: #fff; opacity: 0.7; cursor: pointer; }
        .nav-btn.active { opacity: 1; }

        .reels-info { position: absolute; bottom: 70px; left: 15px; z-index: 20; }
        .progress-bar { position: absolute; bottom: 55px; left: 0; height: 2px; background: #fff; width: 0%; z-index: 100; }
        
        #start-screen { position: absolute; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Play to Start -->
        <div id="start-screen" onclick="startApp()">
            <i class="fas fa-play-circle" style="font-size: 80px; color: var(--primary);"></i>
            <h3 style="margin-top: 20px;">Tap to Start</h3>
        </div>

        <!-- Top Navigation -->
        <div class="top-tabs">
            <span class="tab-item active" onclick="loadMusic('bollywood trending', this)">For You</span>
            <span class="tab-item" onclick="loadMusic('punjabi hits', this)">Punjabi</span>
            <span class="tab-item" onclick="loadMusic('hindi lofi', this)">Lofi</span>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar" id="p-bar"></div>

        <!-- Reels Feed -->
        <div class="swiper">
            <div class="swiper-wrapper" id="main-feed"></div>
        </div>

        <!-- SEARCH OVERLAY -->
        <div class="overlay" id="search-overlay">
            <div class="overlay-header">
                <i class="fas fa-arrow-left" onclick="closeOverlays()"></i>
                <input type="text" class="search-input-full" id="full-search" placeholder="Search..." onkeypress="if(event.key==='Enter') runSearch()">
            </div>
            <div id="search-results" style="overflow-y:auto; flex:1;"></div>
        </div>

        <!-- COMMENT SHEET -->
        <div id="comment-sheet">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #444; padding-bottom:5px;">
                <b>Comments</b>
                <i class="fas fa-times" onclick="closeOverlays()"></i>
            </div>
            <div class="comment-list" id="clist">
                <div class="comment-item"><b>user1:</b> Wow! This song is fire 🔥</div>
                <div class="comment-item"><b>music_lover:</b> Best drop ever! ❤️</div>
            </div>
            <div class="comment-input-row">
                <input type="text" class="search-input-full" placeholder="Add a comment...">
                <button style="background:none; border:none; color:var(--primary); font-weight:bold;">Post</button>
            </div>
        </div>

        <!-- Bottom Nav Bar -->
        <div class="bottom-nav">
            <div class="nav-btn active" onclick="location.reload()"><i class="fas fa-home"></i></div>
            <div class="nav-btn" onclick="openSearch()"><i class="fas fa-search"></i></div>
            <div class="nav-btn"><i class="fas fa-plus-square"></i></div>
            <div class="nav-btn"><i class="fas fa-film" style="color:var(--primary)"></i></div>
            <div class="nav-btn" onclick="alert('Profile Coming Soon!')"><i class="fas fa-user-circle"></i></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let swiper;
        let songs = [];
        let currentAudio = null;

        async function loadMusic(q = 'bollywood trending', el = null) {
            if(el) {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }
            const res = await fetch(`/api/feed/?q=${q}`);
            songs = await res.json();
            
            const feed = document.getElementById('main-feed');
            feed.innerHTML = songs.map((s, i) => `
                <div class="swiper-slide">
                    <img src="${s.cover}" class="main-img" onclick="togglePlay()">
                    
                    <div class="side-bar">
                        <div class="side-item" onclick="toggleLike(this)"><i class="fas fa-heart"></i><p>1.2M</p></div>
                        <div class="side-item" onclick="openComments()"><i class="fas fa-comment"></i><p>845</p></div>
                        <div class="side-item"><i class="fas fa-share"></i><p>Share</p></div>
                    </div>

                    <div class="reels-info">
                        <p style="font-weight:bold; margin:0;">${s.title}</p>
                        <p style="font-size:12px; opacity:0.8;">🎵 ${s.artist}</p>
                    </div>
                </div>
            `).join('');

            if(swiper) swiper.destroy();
            initSwiper();
        }

        function initSwiper() {
            swiper = new Swiper('.swiper', { 
                direction: 'vertical', 
                mousewheel: true,
                on: { slideChange: () => playSong() }
            });
        }

        function playSong() {
            if(currentAudio) currentAudio.pause();
            const song = songs[swiper.activeIndex];
            const pbar = document.getElementById('p-bar');

            currentAudio = new Audio(song.audio_url);
            currentAudio.play().catch(() => console.log("Click to play"));

            currentAudio.ontimeupdate = () => {
                pbar.style.width = (currentAudio.currentTime / currentAudio.duration) * 100 + "%";
            };
            currentAudio.onended = () => swiper.slideNext();
        }

        function togglePlay() {
            if(!currentAudio) return;
            currentAudio.paused ? currentAudio.play() : currentAudio.pause();
        }

        function openSearch() {
            document.getElementById('search-overlay').classList.add('active');
        }

        function openComments() {
            document.getElementById('comment-sheet').classList.add('active');
        }

        function closeOverlays() {
            document.querySelectorAll('.overlay, #comment-sheet').forEach(o => o.classList.remove('active'));
        }

        function runSearch() {
            const q = document.getElementById('full-search').value;
            if(q) {
                closeOverlays();
                loadMusic(q);
            }
        }

        function toggleLike(el) {
            el.querySelector('i').classList.toggle('liked');
        }

        function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            playSong();
        }

        loadMusic();
    </script>
</body>
</html>
